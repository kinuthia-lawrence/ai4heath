<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI4Health - Outbreak Prediction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-white text-gray-900">
    <!-- Header -->
    <header class="bg-blue-600 text-white py-6 shadow">
        <div class="max-w-6xl mx-auto px-4">
            <h1 class="text-3xl font-bold">AI4Health</h1>
            <p class="text-sm text-blue-100">Outbreak Prediction System</p>
        </div>
    </header>

    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- Status -->
        <div class="mb-8 p-4 bg-gray-100 rounded border border-gray-300">
            <p class="text-sm"><strong>API Status:</strong> <span id="statusText">Connecting...</span></p>
        </div>

        <!-- Controls -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <!-- PING -->
            <div class="border border-gray-300 p-6 rounded bg-gray-50">
                <h3 class="font-bold text-lg mb-4">API Health</h3>
                <button onclick="checkApiHealth()" class="w-full bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600">
                    PING API
                </button>
            </div>

            <!-- Obvious -->
            <div class="border border-gray-300 p-6 rounded bg-gray-50">
                <h3 class="font-bold text-lg mb-4">Obvious Patterns</h3>
                <input title="size" type="number" id="obvSize" value="50" min="5" max="500" class="w-full px-3 py-2 border border-gray-300 rounded mb-2">
                <button onclick="simulateObvious()" class="w-full bg-green-600 text-white py-2 px-4 rounded hover:bg-green-700">
                    GENERATE
                </button>
            </div>

            <!-- Random -->
            <div class="border border-gray-300 p-6 rounded bg-gray-50">
                <h3 class="font-bold text-lg mb-4">Random Patterns</h3>
                <input title="size" type="number" id="randSize" value="50" min="5" max="500" class="w-full px-3 py-2 border border-gray-300 rounded mb-2">
                <button onclick="simulateRandom()" class="w-full bg-purple-600 text-white py-2 px-4 rounded hover:bg-purple-700">
                    GENERATE
                </button>
            </div>
        </div>

        <!-- Prediction -->
        <div class="border border-gray-300 p-6 rounded bg-gray-50 mb-8">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold">Predictions</h2>
                <button onclick="runPrediction()" class="bg-red-600 text-white py-2 px-6 rounded hover:bg-red-700 font-bold">
                    RUN PREDICTION
                </button>
            </div>

            <!-- Loading -->
            <div id="loading" class="hidden text-center py-8">
                <p>Analyzing data...</p>
            </div>

            <!-- Results -->
            <div id="results" class="hidden">
                <!-- Nationwide -->
                <div class="mb-6">
                    <h3 class="font-bold text-lg mb-3">Nationwide Summary</h3>
                    <div id="nationwide" class="space-y-2"></div>
                </div>

                <!-- Regions -->
                <div class="mb-6">
                    <h3 class="font-bold text-lg mb-3">Regions</h3>
                    <div id="regions" class="space-y-3"></div>
                </div>

                <!-- Stats -->
                <div class="grid grid-cols-3 gap-4">
                    <div class="border border-gray-300 p-4 rounded text-center">
                        <p class="text-sm text-gray-600">Total Cases</p>
                        <p id="totalCases" class="text-2xl font-bold">0</p>
                    </div>
                    <div class="border border-gray-300 p-4 rounded text-center">
                        <p class="text-sm text-gray-600">Outbreaks</p>
                        <p id="outbreakCount" class="text-2xl font-bold">0</p>
                    </div>
                    <div class="border border-gray-300 p-4 rounded text-center">
                        <p class="text-sm text-gray-600">Time</p>
                        <p id="timestamp" class="text-lg font-bold">--:--:--</p>
                    </div>
                </div>
            </div>

            <!-- Error -->
            <div id="error" class="hidden bg-red-100 border border-red-400 text-red-700 p-4 rounded">
                <p id="errorMsg"></p>
            </div>
        </div>

        <!-- Legend -->
        <div class="border border-gray-300 p-6 rounded bg-gray-50">
            <h3 class="font-bold text-lg mb-3">Status Legend</h3>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 text-sm">
                <div><span class="inline-block w-4 h-4 bg-red-500 rounded mr-2"></span>OUTBREAK (≥40%)</div>
                <div><span class="inline-block w-4 h-4 bg-yellow-500 rounded mr-2"></span>MONITOR (20-39%)</div>
                <div><span class="inline-block w-4 h-4 bg-green-500 rounded mr-2"></span>OK (&lt;20%)</div>
                <div><span class="inline-block w-4 h-4 bg-gray-400 rounded mr-2"></span>NO DATA</div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
